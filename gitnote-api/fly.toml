app = "gitnote-api"
primary_region = "nrt"

[build]

[env]
  PORT = "8080"
  DATABASE_URL = "/data/gitnote.db"
  GIT_REPOS_PATH = "/data/repo.git"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "gitnote_data"
  destination = "/data"
